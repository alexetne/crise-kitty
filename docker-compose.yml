services:
  postgres-db:
    image: postgres:16-alpine
    container_name: postgres-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: myapp_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin-manager
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8080:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres-db

  app:
    build: .
    container_name: node-app
    volumes:
      - .:/usr/src/app
      - node_modules:/usr/src/app/node_modules
    ports:
      - "5001:5001"
    environment:
      DATABASE_URL: "postgresql://user:password@postgres-db:5432/myapp_db"
      PORT: "5001"
      HOST: "0.0.0.0"
    command: sh -c "npm install && npm run prisma:generate && npm run dev"
    depends_on:
      - postgres-db

  ui:
    image: node:24-alpine
    container_name: next-ui
    working_dir: /usr/src/app/ui
    volumes:
      - .:/usr/src/app
      - ui_node_modules:/usr/src/app/ui/node_modules
    ports:
      - "5000:5000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:5001"
    command: sh -c "npm install && npm run dev"
    depends_on:
      - app

volumes:
  node_modules:
  postgres_data:
  pgadmin_data:
  ui_node_modules:
